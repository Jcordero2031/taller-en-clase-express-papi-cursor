 [build]
   publish = "public"
   functions = "netlify/functions"
 
[[redirects]]
  from = "/"
  to = "/.netlify/functions/api/health"
  status = 200
  force = true

 [[redirects]]
   from = "/health"
   to = "/.netlify/functions/api/health"
   status = 200
 
 [[redirects]]
   from = "/login"
   to = "/.netlify/functions/api/login"
   status = 200
 
 [[redirects]]
   from = "/request"
   to = "/.netlify/functions/api/request"
   status = 200
 
 # Optional: forward any other API path segments
 [[redirects]]
   from = "/api/*"
   to = "/.netlify/functions/api/:splat"
   status = 200
